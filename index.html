<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER HACKER - ELITE MASTER</title>
    <style>
        :root { --b: #00f2ff; --p: #ff00ff; --g: #39ff14; --r: #ff0033; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        #matrix { position: fixed; inset: 0; z-index: -1; opacity: 0.15; pointer-events: none; }
        
        #layout { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; max-width: 1200px; margin: auto; }
        @media (min-width: 900px) { #layout { grid-template-columns: 300px 1fr 300px; height: 98vh; } }

        .panel { background: rgba(15, 15, 15, 0.95); border: 2px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; backdrop-filter: blur(10px); position: relative; }
        
        #money { font-size: 45px; color: var(--g); text-align: center; text-shadow: 0 0 15px var(--g); margin: 5px 0; font-weight: bold; }
        #target { font-size: clamp(100px, 25vw, 140px); background: none; border: none; cursor: pointer; margin: 10px auto; display: block; outline: none; transition: 0.1s; }
        #target:active { transform: scale(0.8); }

        .up-btn { background: #1a1a1a; border: 1px solid #444; color: #eee; padding: 12px; margin: 5px 0; cursor: pointer; border-radius: 10px; display: flex; justify-content: space-between; font-size: 13px; align-items: center; }
        .up-btn[disabled] { opacity: 0.1; cursor: not-allowed; }
        .price { color: var(--g); font-weight: bold; }
        
        #leaderboard, #achievements { list-style: none; padding: 0; font-size: 13px; color: var(--b); }
        #leaderboard li, #achievements li { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .locked { filter: grayscale(1); opacity: 0.3; }

        #p-bar { height: 10px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #333; margin: 5px 0; }
        #p-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--b), var(--p)); transition: 0.5s; }

        #event-btn { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--r); color: white; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; display: none; z-index: 1000; border: 4px solid white; animation: pulse 1s infinite; box-shadow: 0 0 30px var(--r); text-align: center; }
        @keyframes pulse { 0% {transform: translateX(-50%) scale(1)} 50% {transform: translateX(-50%) scale(1.1)} 100% {transform: translateX(-50%) scale(1)} }

        #auth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { background: #111; border: 2px solid var(--b); color: white; padding: 15px; font-size: 20px; text-align: center; margin-bottom: 20px; border-radius: 10px; }
        .float { position: absolute; pointer-events: none; animation: floatUp 0.6s ease-out forwards; font-weight: bold; font-size: 30px; text-shadow: 0 0 5px black; z-index: 500;}
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-120px); } }

        .fw-particle { position: fixed; pointer-events: none; z-index: 2000; animation: firework 2s ease-out forwards; font-family: monospace; font-size: 20px; font-weight: bold; }
        @keyframes firework { from { transform: translate(0, 0); opacity: 1; } to { transform: translate(var(--tx), var(--ty)); opacity: 0; } }
    </style><meta name="monetag" content="2ff7db7089f141a072155ce0f63cb05d">
</head>
<body>

<div id="auth">
    <h1 style="color: var(--b);">NOM DU HACKER</h1>
    <input type="text" id="nick" maxlength="12" placeholder="Ex: NEO_99">
    <button onclick="initGame()" style="padding: 15px 40px; background: var(--b); border: none; font-weight: bold; border-radius: 10px; cursor: pointer;">START</button>
</div>

<div id="event-btn" onclick="startEvent()">⚠️ INTRUSION DÉTECTÉE !<br>CLIQUE ICI POUR X5 CLICS !</div>

<canvas id="matrix"></canvas>

<div id="layout">
    <div class="panel" style="order: 2;">
        <h2 style="color: var(--p); font-size: 16px; text-align: center; margin: 0 0 10px 0;">🏆 SUCCÈS</h2>
        <ul id="achievements">
            <li id="ac-1" class="locked">💾 Premier Hack (1k$)</li>
            <li id="ac-2" class="locked">🕶️ Discret (100k$)</li>
            <li id="ac-3" class="locked">🏦 Millionnaire (1M$)</li>
            <li id="ac-4" class="locked">🌌 Maître du Web (1B$)</li>
        </ul>
        <h2 style="color: var(--b); font-size: 16px; text-align: center; margin: 20px 0 10px 0;">🌍 TOP 10</h2>
        <ul id="leaderboard"><li>Sync...</li></ul>
    </div>

    <div class="panel" style="order: 1;">
        <div id="money">0 $</div>
        <div id="p-bar"><div id="p-fill"></div></div>
        <p id="rank" style="text-align: center; color: var(--p); font-size: 14px; margin: 5px 0;">GRADE : NOOB</p>
        <button id="target">👨‍💻</button>
        <div style="display: flex; justify-content: space-around; font-size: 13px; background: #111; padding: 10px; border-radius: 8px;">
            <span>Clic : <b id="v-c" style="color:var(--b)">1$</b></span>
            <span>Auto : <b id="v-a" style="color:var(--g)">0$</b>/s</span>
        </div>
        <div id="oc-timer" style="color: var(--r); text-align: center; font-weight: bold; margin-top: 10px; display: none;">🔥 OVERCLOCK X5 : <span id="secs">10</span>s</div>
    </div>

    <div class="panel" style="order: 3;">
        <h2 style="color: var(--g); font-size: 16px; text-align: center; margin: 0 0 10px 0;">🛒 BOUTIQUE</h2>
        <div id="shop">
            <button class="up-btn" id="up-1" onclick="buy('c')"><span>🖱️ Souris Gaming</span> <span class="price" id="pr-c">25$</span></button>
            <button class="up-btn" id="up-2" onclick="buy('b')"><span>🖥️ PC Master Race</span> <span class="price" id="pr-b">200$</span></button>
            <button class="up-btn" id="up-3" onclick="buy('s')"><span>🌐 Fibre Optique</span> <span class="price" id="pr-s">1.5k$</span></button>
            <button class="up-btn" id="up-4" onclick="buy('i')"><span>🤖 Armée de Bots</span> <span class="price" id="pr-i">12k$</span></button>
            <button class="up-btn" id="up-5" onclick="buy('n')"><span>☁️ Serveur Loué</span> <span class="price" id="pr-n">100k$</span></button>
            <button class="up-btn" id="up-6" onclick="buy('d')"><span>🕸️ Dark Web Elite</span> <span class="price" id="pr-d">1M$</span></button>
        </div>
        <button onclick="reset()" style="margin-top: auto; color: #444; background: none; border: none; font-size: 10px; cursor: pointer;">RESET ALL</button>
    </div>
</div>

<script>
    const FB_URL = "https://cybertap-d937a-default-rtdb.europe-west1.firebasedatabase.app/"; 
    let _s = 0, _c = 1, _a = 0, _l = 1, _boost = 1;
    let _id = localStorage.getItem('hName') || "";
    let _p = { c: 25, b: 200, s: 1500, i: 12000, n: 100000, d: 1000000 };
    const _rk = ["NOOB", "P'TIT HACKER", "PIRATE", "GHOST", "ELITE", "LE PATRON", "LÉGENDE DU WEB"];
    const _colors = ["var(--b)", "var(--p)", "var(--g)"];
    let eventTimeout; // Pour annuler le compte à rebours si on clique

    if (_id) { document.getElementById('auth').style.display = 'none'; loadLocal(); getGlobalBoard(); }

    function initGame() {
        const n = document.getElementById('nick').value.trim();
        if (n.length >= 3) {
            _id = n.toUpperCase(); localStorage.setItem('hName', _id);
            document.getElementById('auth').style.display = 'none';
            syncToCloud(); getGlobalBoard();
        }
    }

    async function syncToCloud() {
        if (!_id || FB_URL.includes("TA_PROPRE")) return;
        try { await fetch(`${FB_URL}/scores/${_id}.json`, { method: 'PUT', body: JSON.stringify({ score: Math.floor(_s) }) }); } catch (e) {}
    }

    async function getGlobalBoard() {
        try {
            const r = await fetch(`${FB_URL}/scores.json`);
            const d = await r.json(); if (!d) return;
            const sorted = Object.keys(d).map(k => ({ n: k, s: d[k].score })).sort((a,b) => b.s - a.s).slice(0, 10);
            document.getElementById('leaderboard').innerHTML = sorted.map((x, i) => `<li>#${i+1} ${x.n} <span>${fmt(x.s)}</span></li>`).join('');
        } catch (e) {}
    }

    function fmt(n) {
        if (n < 1000) return Math.floor(n);
        if (n < 1000000) return (n/1000).toFixed(1) + "k";
        if (n < 1000000000) return (n/1000000).toFixed(1) + "M";
        return (n/1000000000).toFixed(2) + "B";
    }

    function updateUI() {
        document.getElementById('money').innerText = fmt(_s) + " $";
        document.getElementById('v-c').innerText = fmt(_c * _boost) + "$";
        document.getElementById('v-a').innerText = fmt(_a) + "$";
        document.getElementById('rank').innerText = "GRADE : " + _rk[Math.min(_l-1, _rk.length-1)];
        
        let i = 1; for (let k in _p) {
            document.getElementById('pr-' + k).innerText = fmt(_p[k]) + "$";
            document.getElementById('up-' + i).disabled = _s < _p[k];
            i++;
        }

        checkAch(1, 1000); checkAch(2, 100000); checkAch(3, 1000000); checkAch(4, 1000000000);

        let next = Math.pow(_l, 4) * 1500;
        document.getElementById('p-fill').style.width = Math.min((_s/next)*100, 100) + "%";
        if (_s >= next && _l < _rk.length) _l++;
        saveLocal();
    }

    function checkAch(id, goal) {
        let el = document.getElementById('ac-'+id);
        if (_s >= goal && el.classList.contains('locked')) {
            el.classList.remove('locked');
            celebrate(); 
        }
    }

    function buy(k) {
        if (_s >= _p[k]) {
            _s -= _p[k];
            if (k === 'c') _c += 1; if (k === 'b') _a += 3; if (k === 's') _a += 15; if (k === 'i') _a += 80; if (k === 'n') _a += 400; if (k === 'd') _a += 3000;
            _p[k] = Math.floor(_p[k] * 1.9);
            updateUI(); syncToCloud();
        }
    }

    function spawnEvent() { 
        const btn = document.getElementById('event-btn');
        btn.style.display = 'block'; 
        // SUPPRESSION APRES 4 SECONDES SI PAS CLIQUÉ
        eventTimeout = setTimeout(() => {
            btn.style.display = 'none';
        }, 4000);
    }

    function startEvent() {
        clearTimeout(eventTimeout); // Annule la disparition automatique
        document.getElementById('event-btn').style.display = 'none';
        _boost = 5;
        document.getElementById('oc-timer').style.display = 'block';
        let left = 10;
        let iv = setInterval(() => {
            left--; document.getElementById('secs').innerText = left;
            if (left <= 0) { clearInterval(iv); _boost = 1; document.getElementById('oc-timer').style.display = 'none'; }
        }, 1000);
    }
    
    setInterval(spawnEvent, 600000); // 10 minutes

    const handleTap = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        let gain = _c * _boost; _s += gain;
        const x = e.clientX || (e.touches ? e.touches[0].pageX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].pageY : 0);
        const t = document.createElement('div');
        t.className = 'float'; t.innerText = "+" + gain + "$";
        t.style.left = (x - 20) + "px"; t.style.top = (y - 30) + "px";
        if(_boost > 1) t.style.color = "var(--r)"; else t.style.color = "var(--b)";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 600);
        updateUI();
    };

    document.getElementById('target').addEventListener('touchstart', handleTap);
    document.getElementById('target').addEventListener('click', handleTap);

    function celebrate() {
        const amount = 30;
        const startX = window.innerWidth / 2;
        const startY = window.innerHeight / 2;
        for (let i = 0; i < amount; i++) {
            const el = document.createElement('div');
            el.className = 'fw-particle';
            el.innerText = String.fromCharCode(33+Math.random()*94);
            el.style.color = _colors[Math.floor(Math.random()*_colors.length)];
            el.style.left = startX + 'px';
            el.style.top = startY + 'px';
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 200;
            el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }
    }

    function saveLocal() { localStorage.setItem('cyberSaveFinal', JSON.stringify({ _s, _c, _a, _l, _p })); }
    function loadLocal() {
        const d = JSON.parse(localStorage.getItem('cyberSaveFinal'));
        if (d) { _s = d._s; _c = d._c; _a = d._a; _l = d._l; _p = d._p; }
        updateUI();
    }
    function reset() { if(confirm("Supprimer toute la progression ?")) { localStorage.clear(); location.reload(); } }

    setInterval(() => { _s += _a / 10; updateUI(); }, 100);
    setInterval(syncToCloud, 20000);
    setInterval(getGlobalBoard, 10000);

    const cvs = document.getElementById('matrix'); const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    const drp = Array(Math.floor(cvs.width/20)).fill(1);
    function drawM() {
        ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drp.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(33+Math.random()*94), i*20, y*20);
            if (y*20 > cvs.height && Math.random() > 0.98) drp[i] = 0; drp[i]++;
        });
    }
    setInterval(drawM, 50);
</script>
</body>

</html>
